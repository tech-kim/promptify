<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promptify</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --accent: #7c3aed;
    --accent2: #ec4899;
    --text: #e2e8f0;
    --muted: #64748b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }
  .header {
    text-align: center;
    margin-bottom: 40px;
  }
  .tag {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 4px;
    margin-bottom: 16px;
  }
  h1 {
    font-family: 'Space Mono', monospace;
    font-size: clamp(36px, 8vw, 64px);
    font-weight: 700;
    letter-spacing: -2px;
  }
  h1 span { color: var(--accent2); }
  .subtitle {
    color: var(--muted);
    margin-top: 12px;
    font-size: 15px;
  }
  .wave {
    display: flex;
    gap: 3px;
    justify-content: center;
    margin: 24px 0;
  }
  .wave span {
    display: block;
    width: 3px;
    background: linear-gradient(var(--accent), var(--accent2));
    border-radius: 2px;
    animation: wave 1.2s ease-in-out infinite;
  }
  .wave span:nth-child(1){height:20px;animation-delay:0s}
  .wave span:nth-child(2){height:35px;animation-delay:0.1s}
  .wave span:nth-child(3){height:25px;animation-delay:0.2s}
  .wave span:nth-child(4){height:40px;animation-delay:0.3s}
  .wave span:nth-child(5){height:30px;animation-delay:0.4s}
  .wave span:nth-child(6){height:45px;animation-delay:0.5s}
  .wave span:nth-child(7){height:28px;animation-delay:0.4s}
  .wave span:nth-child(8){height:38px;animation-delay:0.3s}
  .wave span:nth-child(9){height:22px;animation-delay:0.2s}
  .wave span:nth-child(10){height:32px;animation-delay:0.1s}
  .wave span:nth-child(11){height:18px;animation-delay:0s}
  @keyframes wave {
    0%,100%{transform:scaleY(1)}
    50%{transform:scaleY(0.4)}
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 680px;
  }
  .input-group {
    margin-bottom: 16px;
  }
  .input-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 8px;
    display: block;
  }
  input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    color: var(--text);
    font-size: 15px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }
  .row { display: flex; gap: 12px; }
  .row .input-group { flex: 1; }
  button {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 8px;
    padding: 16px;
    color: white;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Space Mono', monospace;
    cursor: pointer;
    letter-spacing: 1px;
    margin-top: 8px;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .error {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px;
    padding: 14px 16px;
    color: #f87171;
    margin-top: 16px;
    font-size: 14px;
  }
  .loading {
    text-align: center;
    padding: 24px;
    color: var(--muted);
    font-size: 14px;
    margin-top: 16px;
  }
  .result { margin-top: 24px; }
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .tab {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .content {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    font-size: 14px;
    line-height: 1.8;
    white-space: pre-wrap;
    max-height: 500px;
    overflow-y: auto;
  }
  .copy-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 20px;
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    width: auto;
    margin-top: 12px;
    transition: border-color 0.2s;
  }
  .copy-btn:hover { border-color: var(--accent); }
  footer {
    margin-top: 40px;
    color: var(--muted);
    font-size: 12px;
    font-family: 'Space Mono', monospace;
  }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>

<div class="header">
  <div class="tag">✦ AI MUSIC INTELLIGENCE</div>
  <h1>Prompt<span>ify</span></h1>
  <p class="subtitle">곡 정보를 입력하면 Suno AI 프롬프트를 생성합니다</p>
  <div class="wave">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span><span></span>
  </div>
</div>

<div class="card">
  <div class="input-group">
    <label class="input-label">🎵 곡 제목</label>
    <input type="text" id="titleInput" placeholder="예: MANIAC" />
  </div>
  <div class="row">
    <div class="input-group">
      <label class="input-label">🎤 아티스트</label>
      <input type="text" id="artistInput" placeholder="예: VIVIZ" />
    </div>
    <div class="input-group">
      <label class="input-label">🎸 장르 (선택)</label>
      <input type="text" id="genreInput" placeholder="예: K-Pop" />
    </div>
  </div>
  <button id="analyzeBtn" onclick="analyze()">▶ 분석</button>

  <div id="error" class="error" style="display:none"></div>
  <div id="loading" class="loading" style="display:none">🎵 AI가 분석 중입니다...</div>

  <div id="result" class="result" style="display:none">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('report')">📄 전체 리포트</div>
      <div class="tab" onclick="switchTab('suno')">🎛️ Suno 프롬프트</div>
    </div>
    <div id="reportContent" class="content"></div>
    <div id="sunoContent" class="content" style="display:none"></div>
    <button class="copy-btn" onclick="copyPrompt()">📋 Suno 프롬프트 복사</button>
  </div>
</div>

<footer>
  Promptify — <a href="https://github.com/tech-kim/promptify" target="_blank">GitHub</a> · Powered by Claude AI
</footer>

<script>
const API_BASE = "https://promptify-q3oh.onrender.com";
let sunoText = "";

async function analyze() {
  const title = document.getElementById('titleInput').value.trim();
  const artist = document.getElementById('artistInput').value.trim();
  const genre = document.getElementById('genreInput').value.trim();

  if (!title) {
    showError("곡 제목을 입력해주세요.");
    return;
  }

  document.getElementById('error').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('analyzeBtn').disabled = true;

  try {
    const res = await fetch(`${API_BASE}/analyze`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, artist, genre })
    });

    const data = await res.json();

    if (!res.ok) throw new Error(data.detail || '분석 실패');

    document.getElementById('reportContent').textContent = data.report;
    sunoText = data.suno_prompt;
    document.getElementById('sunoContent').textContent = sunoText;
    document.getElementById('result').style.display = 'block';

  } catch (e) {
    showError("분석 중 오류가 발생했습니다: " + e.message);
  } finally {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('analyzeBtn').disabled = false;
  }
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = "⚠ " + msg;
  el.style.display = 'block';
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (tab === 'report') {
    document.querySelectorAll('.tab')[0].classList.add('active');
    document.getElementById('reportContent').style.display = 'block';
    document.getElementById('sunoContent').style.display = 'none';
  } else {
    document.querySelectorAll('.tab')[1].classList.add('active');
    document.getElementById('reportContent').style.display = 'none';
    document.getElementById('sunoContent').style.display = 'block';
  }
}

function copyPrompt() {
  navigator.clipboard.writeText(sunoText).then(() => {
    alert('복사됐습니다!');
  });
}
</script>
</body>
</html>
